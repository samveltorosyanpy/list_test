<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Настройка фильтра</title>
    <!-- Подключаем скрипт Telegram WebApp -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            padding: 20px;
            margin: 0;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
        }
        select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--tg-theme-hint-color, #ccc);
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: var(--tg-theme-button-color, #248bcf);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="form-group">
        <label for="currency">Выберите валюту объявлений:</label>
        <select id="currency">
            <option value="0">AMD (Драмы)</option>
            <option value="1">USD (Доллары)</option>
        </select>
    </div>

    <button id="saveBtn">Применить фильтр</button>

    <script>
        // Инициализируем Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // Расширяем на весь экран

        document.getElementById('saveBtn').addEventListener('click', () => {
            const currencyId = document.getElementById('currency').value;

            // Базовый URL, который уже есть в твоем коде, но с динамическим crc
            const baseUrl = `https://www.list.am/category/62?n=1%2C2%2C3%2C4%2C5%2C6%2C7%2C8%2C9%2C10%2C13%2C11%2C12&sname=&s=&cmtype=0&price1=&price2=&cnd=&crc=${currencyId}`;

            // Собираем данные для отправки боту
            const data = {
                url: baseUrl,
                currency: currencyId === "1" ? "USD" : "AMD"
            };

            // Отправляем данные обратно в бота (строкой JSON)
            tg.sendData(JSON.stringify(data));

            // Закрываем WebApp
            tg.close();
        });
    </script>
</body>
</html>
